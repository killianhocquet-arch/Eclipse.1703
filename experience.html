<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mount Gay Eclipse AR Experience</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
  </style>

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [{
          "name": "bouteille-eclipse",
          "type": "PLANAR",
          "imagePath": "assets/Targets/Target_bouteille_eclipse.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 201, "height": 841,
            "originalWidth": 201, "originalHeight": 841,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    /**
     * ar-anchor
     * Stratégie : le contenu AR (#ar-content) est une entité indépendante dans la scène.
     * - xrimagefound / xrimageupdated → lerp position vers le target (smooth)
     * - xrimagelost → ne fait rien, #ar-content reste visible à la dernière position
     *
     * Le contenu n'est PAS enfant de xrextras-named-image-target, donc
     * xrextras ne peut pas le cacher quand le target est perdu.
     */
    AFRAME.registerComponent('ar-anchor', {
      schema: { factor: { default: 0.05 } },

      init: function () {
        this.content = null;
        this.tracking = false;
        this._pos = new THREE.Vector3();
        this._quat = new THREE.Quaternion();

        this.el.addEventListener('xrimagefound', (e) => {
          if (!this.content) {
            this.content = document.querySelector('#ar-content');
          }
          // Initialise la position immédiatement depuis event.detail
          const p = e.detail.position;
          const r = e.detail.rotation;
          this.content.object3D.position.set(p.x, p.y, p.z);
          this.content.object3D.quaternion.set(r.x, r.y, r.z, r.w);
          this.content.setAttribute('visible', true);
          this.tracking = true;
          this.content.emit('ar-sequence-start');
          console.log('[AR] found');
        });

        this.el.addEventListener('xrimageupdated', (e) => {
          // Mise à jour position chaque frame pendant le tracking
          const p = e.detail.position;
          const r = e.detail.rotation;
          this._pos.set(p.x, p.y, p.z);
          this._quat.set(r.x, r.y, r.z, r.w);
        });

        this.el.addEventListener('xrimagelost', () => {
          // Ne rien faire — le contenu reste figé à la dernière position
          this.tracking = false;
          console.log('[AR] lost — frozen');
        });
      },

      tick: function () {
        if (!this.tracking || !this.content) return;
        const f = this.data.factor;
        this.content.object3D.position.lerp(this._pos, f);
        this.content.object3D.quaternion.slerp(this._quat, f);
      }
    });
  </script>
</head>
<body>
  <a-scene
    xrweb="disableWorldTracking: true"
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error>

    <a-camera position="0 4 10"></a-camera>

    <!-- Target vide : détecte uniquement, ne gère pas la visibilité du contenu -->
    <xrextras-named-image-target name="bouteille-eclipse" ar-anchor="factor: 0.05">
    </xrextras-named-image-target>

    <!-- Contenu AR indépendant — xrextras ne peut pas le cacher -->
    <a-entity id="ar-content" visible="false">
      <a-box class="ar-content" color="red"   width="0.3" height="0.02" depth="0.02" position="0.15 0 0"></a-box>
      <a-box class="ar-content" color="green" width="0.02" height="0.3" depth="0.02" position="0 0.15 0"></a-box>
      <a-box class="ar-content" color="blue"  width="0.02" height="0.02" depth="0.3" position="0 0 0.15"></a-box>
      <a-sphere class="ar-content" color="white" radius="0.03" position="0 0 0"></a-sphere>
    </a-entity>

  </a-scene>
</body>
</html>
