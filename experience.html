<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mount Gay Eclipse AR Experience</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
  </style>

  <!-- AR Libraries (ordre : synchrones en premier, engine async en dernier) -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine — async, data-preload-chunks précharge xr-slam.js (5.4MB) -->
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [
          {
            name: "bouteille-eclipse",
            left: 0,
            top: 0,
            width: 1,
            height: 1,
            originalWidth: 595,
            originalHeight: 842,
            isRotated: false
          }
        ]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);

    // Debug : événements tracking
    document.addEventListener('DOMContentLoaded', () => {
      const target = document.querySelector('[name="bouteille-eclipse"]');
      if (target) {
        target.addEventListener('xrimagefound', () => console.log('[AR] Target détecté !'));
        target.addEventListener('xrimagelost', () => console.log('[AR] Target perdu'));
      }
    });
  </script>
</head>
<body>
  <a-scene
    xrweb="disableWorldTracking: true"
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="bouteille-eclipse">
      <!-- OBJET DE TEST — à supprimer après validation tracking (Story 2.2) -->
      <a-box color="red" scale="0.3 0.3 0.3" position="0 0.15 0"></a-box>
    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
