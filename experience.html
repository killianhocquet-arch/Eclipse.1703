<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mount Gay Eclipse AR Experience</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
  </style>

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [{
          "name": "bouteille-eclipse",
          "type": "CYLINDRICAL",
          "imagePath": "assets/Targets/Target_bouteille_eclipse.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 842, "height": 595,
            "originalWidth": 842, "originalHeight": 595,
            "isRotated": false,
            "arcStartRad": 0,
            "arcLengthRad": 6.28
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    // smooth-target : lerp/slerp pour absorber les tremblements de tracking
    AFRAME.registerComponent('smooth-target', {
      schema: { factor: { default: 0.05 } },
      init: function () {
        this.smoothPos = new THREE.Vector3();
        this.smoothQuat = new THREE.Quaternion();
        this.initialized = false;
        this.el.addEventListener('xrimagefound', () => {
          if (!this.initialized) {
            this.smoothPos.copy(this.el.object3D.position);
            this.smoothQuat.copy(this.el.object3D.quaternion);
            this.initialized = true;
          }
        });
      },
      tick: function () {
        if (!this.initialized) return;
        const f = this.data.factor;
        this.smoothPos.lerp(this.el.object3D.position, f);
        this.smoothQuat.slerp(this.el.object3D.quaternion, f);
        this.el.object3D.position.copy(this.smoothPos);
        this.el.object3D.quaternion.copy(this.smoothQuat);
      }
    });

    /**
     * ar-sequence-controller
     * Gère le cycle de vie de la scène AR :
     *   - xrimagefound → montre .ar-content, émet 'ar-sequence-start'
     *   - xrimagelost  → cache .ar-content, émet 'ar-sequence-pause'
     * Chaque nouvelle détection repart depuis le début (séquence courte 5-10 sec).
     *
     * Events émis sur this.el :
     *   'ar-sequence-start'  — reçu par les composants d'animation de l'Epic 3
     *   'ar-sequence-pause'  — permet de mettre en pause les animations
     */
    AFRAME.registerComponent('ar-sequence-controller', {
      init: function () {
        this.isTracking = false;

        // Le target parent (xrextras-named-image-target)
        const target = this.el.parentEl;

        target.addEventListener('xrimagefound', () => {
          console.log('[AR] Séquence start');
          this.isTracking = true;
          this.showContent();
          this.el.emit('ar-sequence-start');
        });

        target.addEventListener('xrimagelost', () => {
          console.log('[AR] Séquence pause');
          this.isTracking = false;
          this.hideContent();
          this.el.emit('ar-sequence-pause');
        });
      },

      showContent: function () {
        this.el.querySelectorAll('.ar-content').forEach(el => {
          el.setAttribute('visible', true);
        });
      },

      hideContent: function () {
        this.el.querySelectorAll('.ar-content').forEach(el => {
          el.setAttribute('visible', false);
        });
      }
    });
  </script>
</head>
<body>
  <a-scene
    xrweb="disableWorldTracking: true"
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="bouteille-eclipse" smooth-target="factor: 0.05">

      <a-entity ar-sequence-controller>

        <!-- DEBUG AXES (remplacés en Epic 3) -->
        <a-box class="ar-content" color="red"   width="0.3" height="0.02" depth="0.02" position="0.15 0 0" visible="false"></a-box>
        <a-box class="ar-content" color="green" width="0.02" height="0.3" depth="0.02" position="0 0.15 0" visible="false"></a-box>
        <a-box class="ar-content" color="blue"  width="0.02" height="0.02" depth="0.3" position="0 0 0.15" visible="false"></a-box>
        <a-sphere class="ar-content" color="white" radius="0.03" position="0 0 0" visible="false"></a-sphere>

      </a-entity>
    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
