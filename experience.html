<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mount Gay Eclipse AR Experience</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
  </style>

  <!-- AR Libraries (ordre : synchrones en premier, engine async en dernier) -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine — async, data-preload-chunks précharge xr-slam.js (5.4MB) -->
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration — sera rempli avec les données réelles en Story 2.1 -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: []
        // TODO Story 2.1 : remplacer par les données du target Mount Gay Eclipse
        // Exemple :
        // imageTargetData: [{
        //   "name": "mount-gay-bottle",
        //   "type": "PLANAR",
        //   "imagePath": "assets/Targets/[target-file].jpg",
        //   "properties": { "left": 0, "top": 0, "width": 830, "height": 830,
        //                   "originalWidth": 830, "originalHeight": 830, "isRotated": false }
        // }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>
</head>
<body>
  <a-scene
    xrweb="disableWorldTracking: true"
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error>

    <a-camera position="0 4 10"></a-camera>

    <!-- Contenu AR sera ajouté ici dans les stories suivantes -->

  </a-scene>
</body>
</html>
