<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mount Gay Eclipse AR Experience</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
  </style>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [
          {
            "name": "bouteille-eclipse",
            "type": "CYLINDRICAL",
            "imagePath": "assets/Targets/Target_bouteille_eclipse.jpg",
            "properties": {
              "left": 0,
              "top": 0,
              "width": 842,
              "height": 595,
              "originalWidth": 842,
              "originalHeight": 595,
              "isRotated": false,
              "arcStartRad": 0,
              "arcLengthRad": 6.28
            }
          }
        ]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    // freeze-on-lost : quand l'étiquette sort du champ de vision,
    // le contenu reste visible à sa dernière position connue.
    // Pas de SLAM = pas de drift.
    AFRAME.registerComponent('freeze-on-lost', {
      init: function () {
        this.el.addEventListener('xrimagelost', () => {
          // Snapshot de la transform monde au moment de la perte
          const worldPos = new THREE.Vector3();
          const worldQuat = new THREE.Quaternion();
          this.el.object3D.getWorldPosition(worldPos);
          this.el.object3D.getWorldQuaternion(worldQuat);

          // Déplace les enfants vers la scène racine à cette position
          const scene = this.el.sceneEl.object3D;
          const children = [...this.el.object3D.children];
          children.forEach(child => {
            child.getWorldPosition(worldPos);
            child.getWorldQuaternion(worldQuat);
            scene.attach(child);          // reattach dans l'espace monde
          });
        });

        this.el.addEventListener('xrimagefound', () => {
          console.log('[AR] Bouteille détectée');
        });
      }
    });
  </script>
</head>
<body>
  <a-scene
    xrweb="disableWorldTracking: true"
    xrextras-gesture-detector
    xrextras-loading
    xrextras-runtime-error>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="bouteille-eclipse" freeze-on-lost>
      <!-- DEBUG AXES — X=rouge, Y=vert, Z=bleu -->
      <a-box color="red"   width="0.3" height="0.02" depth="0.02" position="0.15 0 0"></a-box>
      <a-box color="green" width="0.02" height="0.3" depth="0.02" position="0 0.15 0"></a-box>
      <a-box color="blue"  width="0.02" height="0.02" depth="0.3" position="0 0 0.15"></a-box>
      <a-sphere color="white" radius="0.03" position="0 0 0"></a-sphere>
    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
