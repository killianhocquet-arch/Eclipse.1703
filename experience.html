<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mount Gay Eclipse AR Experience</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
  </style>

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [{
          "name": "bouteille-eclipse",
          "type": "CYLINDRICAL",
          "imagePath": "assets/Targets/Target_bouteille_eclipse.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 842, "height": 595,
            "originalWidth": 842, "originalHeight": 595,
            "isRotated": false,
            "arcStartRad": 0,
            "arcLengthRad": 6.28
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    // smooth-target : lerp position + slerp rotation à chaque frame
    // xrextras pose la valeur brute → on lisse vers elle
    // factor: 0.0 = ultra lent, 1.0 = pas de lissage. 0.2 = fluide pour démo
    AFRAME.registerComponent('smooth-target', {
      schema: { factor: { default: 0.2 } },
      init: function () {
        this.smoothPos = new THREE.Vector3();
        this.smoothQuat = new THREE.Quaternion();
        this.initialized = false;

        this.el.addEventListener('xrimagefound', () => {
          if (!this.initialized) {
            this.smoothPos.copy(this.el.object3D.position);
            this.smoothQuat.copy(this.el.object3D.quaternion);
            this.initialized = true;
          }
        });
      },
      tick: function () {
        if (!this.initialized) return;
        const f = this.data.factor;
        this.smoothPos.lerp(this.el.object3D.position, f);
        this.smoothQuat.slerp(this.el.object3D.quaternion, f);
        this.el.object3D.position.copy(this.smoothPos);
        this.el.object3D.quaternion.copy(this.smoothQuat);
      }
    });
  </script>
</head>
<body>
  <a-scene
    xrweb="disableWorldTracking: true"
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="bouteille-eclipse" smooth-target="factor: 0.2">
      <!-- DEBUG AXES — X=rouge, Y=vert, Z=bleu -->
      <a-box color="red"   width="0.3" height="0.02" depth="0.02" position="0.15 0 0"></a-box>
      <a-box color="green" width="0.02" height="0.3" depth="0.02" position="0 0.15 0"></a-box>
      <a-box color="blue"  width="0.02" height="0.02" depth="0.3" position="0 0 0.15"></a-box>
      <a-sphere color="white" radius="0.03" position="0 0 0"></a-sphere>
    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
