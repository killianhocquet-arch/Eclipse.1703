<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mount Gay Eclipse AR Experience</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
  </style>

  <!-- AR Libraries (ordre : synchrones en premier, engine async en dernier) -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine — async, data-preload-chunks précharge xr-slam.js (5.4MB) -->
  <script async src="engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration — CYLINDRICAL pour étiquette bouteille -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [
          {
            "name": "bouteille-eclipse",
            "type": "CYLINDRICAL",
            "imagePath": "assets/Targets/Target_bouteille_eclipse.jpg",
            "properties": {
              "left": 0,
              "top": 0,
              "width": 842,
              "height": 595,
              "originalWidth": 842,
              "originalHeight": 595,
              "isRotated": false,
              "arcStartRad": 0,
              "arcLengthRad": 6.28
            }
          }
        ]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    // Composant world-anchor :
    // Quand la bouteille est détectée la 1ère fois, le contenu AR est placé
    // dans l'espace monde (SLAM) — il reste stable même si on tourne autour.
    AFRAME.registerComponent('world-anchor', {
      init: function () {
        this.placed = false;
        this.contentEl = document.querySelector('#ar-content');

        this.el.addEventListener('xrimagefound', () => {
          if (this.placed) return;

          // Copie la position/rotation monde de l'image target
          const src = this.el.object3D;
          const dst = this.contentEl.object3D;

          dst.position.copy(src.getWorldPosition(new THREE.Vector3()));
          dst.quaternion.copy(src.getWorldQuaternion(new THREE.Quaternion()));
          this.contentEl.setAttribute('visible', true);

          this.placed = true;
          console.log('[AR] Ancre posée — SLAM actif');
        });

        this.el.addEventListener('xrimagelost', () => {
          console.log('[AR] Label hors vue — contenu maintenu par SLAM');
        });
      }
    });
  </script>
</head>
<body>
  <a-scene
    xrweb="disableWorldTracking: false"
    xrextras-gesture-detector
    xrextras-loading
    xrextras-runtime-error>

    <a-camera position="0 4 10"></a-camera>

    <!-- Image target : détecte la bouteille, pose l'ancre, puis se décroche -->
    <xrextras-named-image-target name="bouteille-eclipse" world-anchor>
    </xrextras-named-image-target>

    <!-- Contenu AR ancré dans l'espace monde via SLAM -->
    <a-entity id="ar-content" visible="false">
      <!-- DEBUG AXES — X=rouge, Y=vert, Z=bleu -->
      <a-box color="red"   width="0.3" height="0.02" depth="0.02" position="0.15 0 0"></a-box>
      <a-box color="green" width="0.02" height="0.3" depth="0.02" position="0 0.15 0"></a-box>
      <a-box color="blue"  width="0.02" height="0.02" depth="0.3" position="0 0 0.15"></a-box>
      <a-sphere color="white" radius="0.03" position="0 0 0"></a-sphere>
    </a-entity>

  </a-scene>
</body>
</html>
